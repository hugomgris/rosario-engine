name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libasound2-dev \
          mesa-common-dev \
          libglfw3-dev \
          pkg-config
    
    - name: Cache libraries
      uses: actions/cache@v4
      with:
        path: |
          libs/raylib
          libs/googletest
        key: ${{ runner.os }}-libs-${{ hashFiles('Makefile') }}-raylib-v2
        restore-keys: |
          ${{ runner.os }}-libs-
    
    - name: Build Raylib
      run: |
        if [ ! -f "libs/raylib/src/libraylib.a" ]; then
          mkdir -p libs
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git libs/raylib
          cd libs/raylib/src
          make PLATFORM=PLATFORM_DESKTOP
        fi
    
    - name: Build Google Test
      run: make check_gtest
    
    - name: Build project
      run: make all
    
    - name: Run tests
      run: make test
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          rosario
          run_tests
          test_results.json
          *.log